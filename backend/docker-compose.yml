name: afyadirect-v3

services:
  backend:
    build: .
    # REMOVED hardcoded container_name to prevent kernel lock collisions
    init: true # CRITICAL: Forwards signals cleanly and harvests zombie processes automatically
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - ALLOWED_FILE_TYPES=["image/jpeg","image/png"]
    depends_on:
      - redis_new
    volumes:
      - .:/app
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - afyadirect-network

  redis_new:
    image: redis:7-alpine
    container_name: afyadirect-redis-v2
    privileged: true  
    init: true  
    ports:
      - "6379:6379"
    volumes:
      - redis-data-v2:/data
    restart: always 
    networks:
      - afyadirect-network

  celery-worker:
    build: .
    init: true # Prevents unyielding celery child forks from hanging the kernel
    command: celery -A app.worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - PYTHONPATH=/app 
    depends_on:
      - redis_new
      - backend
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

  celery-beat:
    build: .
    init: true
    command: celery -A app.worker beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - PYTHONPATH=/app
    depends_on:
      - redis_new
      - backend
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

networks:
  afyadirect-network:
    driver: bridge

volumes:
  redis-data-v2: