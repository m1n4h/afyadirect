version: '3.8'

services:
  backend:
    build: ./backend
    container_name: afyadirect-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - APP_ENV=production
    depends_on:
      - redis
    volumes:
      - ./backend/firebase-adminsdk.json:/app/firebase-adminsdk.json
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - afyadirect-network

  redis:
    image: redis:7-alpine
    container_name: afyadirect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - afyadirect-network

  celery-worker:
    build: ./backend
    container_name: afyadirect-celery-worker
    command: celery -A app.worker.celery worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

  celery-beat:
    build: ./backend
    container_name: afyadirect-celery-beat
    command: celery -A app.worker.celery beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

networks:
  afyadirect-network:
    driver: bridge

volumes:
  redis-data: